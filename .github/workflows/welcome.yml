name: Welcome Contributor

on:
  pull_request_target:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest

    steps:
      - name: Welcome First Time Contributors
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          pr-message: |
            Thanks for contributing to Take One Nexus 🚀

            Please ensure:
            - Your code follows project guidelines
            - You linked the correct issue
            - Screenshots/videos are attached if needed
            - Build and lint checks pass

            Maintainer will review your PR soon.
