name: Issue Auto Response

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  respond:
    runs-on: ubuntu-latest

    steps:
      - name: Comment on new issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `👋 Thank you for opening this issue in Take One Nexus!

              The maintainers will review your issue within 24–48 hours.

              If the issue is valid and suitable for contribution, it may be assigned to a contributor shortly.

              Meanwhile, please ensure:
              - The issue description is clear
              - Steps to reproduce are included (if applicable)
              - Screenshots/videos are attached if relevant

              Thank you for contributing to Take One Nexus 🚀`
            });